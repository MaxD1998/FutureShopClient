<div class="flex flex-col justify-center">
  <button class="p-2 border rounded-md {{ width() }} {{ initLayout() }}" [disabled]="isDisabled()">
    @if (isIcon()) {
      <app-icon [iconName]="label()"></app-icon>
    } @else {
      {{ label() }}
    }
  </button>
  <ng-content></ng-content>
</div>
